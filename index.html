<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#00957f">
  <title>Bếp Sỉ Báo Cáo</title>
  <link rel="manifest" href="manifest.webmanifest">
  <style>
    :root{--bg:#f5faf8;--card:#fff;--ink:#082337;--muted:#63727c;--line:#dce8e5;--teal:#00957f;--dark:#007866;--soft:#e6f8f3;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink)}button,input,select,textarea{font:inherit}button{cursor:pointer}.app{width:100%;min-height:100dvh;background:linear-gradient(#fbfffd,var(--bg));overflow:hidden}.top{position:sticky;top:0;z-index:20;min-height:74px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;background:#fff;border-bottom:1px solid var(--line)}.brand{display:flex;gap:10px;align-items:center}.logo{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;background:var(--teal);color:#fff;font-size:22px;font-weight:900}.brand b,.brand small{display:block}.brand small{font-size:12px;color:var(--muted)}.sync-state{border:0;background:transparent;font-weight:800}.sync-state span{display:inline-block;width:9px;height:9px;border-radius:50%;background:#f59625;margin-right:6px}main{height:calc(100dvh - 74px);padding:12px 12px 86px;overflow:hidden}.page{display:none;height:100%;min-height:0}.page.active{display:block}h1{font-size:22px;margin:0 0 12px}.grid-actions{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:12px}.card{min-height:128px;border:1px solid var(--line);border-radius:20px;background:#fff;padding:12px;text-align:left;display:grid;gap:6px;box-shadow:0 12px 26px rgba(12,55,50,.07)}.card i{font-style:normal;font-size:30px}.card b{font-size:16px}.card small{color:var(--muted);font-size:12px}.card em{width:max-content;margin-top:auto;padding:7px 11px;border-radius:999px;background:var(--soft);color:var(--dark);font-style:normal;font-size:12px;font-weight:900}.card-mcp{background:#f3fbff}.card-order{background:#fff8ef}.card-test{background:#f2fbf8}.card-report{background:#faf7ff}.panel,.admin,.warn{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px;box-shadow:0 8px 20px rgba(12,55,50,.05)}.panel{height:calc(100% - 284px);min-height:0;display:grid;grid-template-rows:auto minmax(0,1fr)}.head{display:flex;align-items:center;justify-content:space-between}.head h2{font-size:16px;margin:0}.head button,.ghost{border:0;background:transparent;color:var(--dark);font-weight:850}.mini,.record{background:#fff;border-top:1px solid #edf2f0;min-height:56px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}.record{border:1px solid var(--line);border-radius:16px;margin-bottom:10px;padding:12px}.data-hub{display:block;margin:2px 0 12px}.data-hub-tabs{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.data-hub-tab{min-height:58px;border:1px solid var(--line);border-radius:17px;background:#fff;display:grid;place-items:center;gap:3px;font-weight:950;color:#17343d;box-shadow:0 8px 18px rgba(12,55,50,.055)}.data-hub-tab i{font-style:normal;font-size:20px}.data-hub-tab span{font-size:11px}.data-hub-tab.active{border-color:#9bdccd;background:linear-gradient(180deg,#eafff8,#dff8f1);color:#007866}.data-list-wrap{min-height:0;overflow:auto}.primary{border:0;border-radius:12px;background:linear-gradient(135deg,var(--teal),var(--dark));color:#fff;font-weight:900;min-height:44px}.wide{width:100%}.admin{margin-bottom:12px;display:grid;grid-template-columns:1fr auto;gap:10px}.secondary{min-height:38px;border:1px solid var(--teal);border-radius:10px;background:#fff;color:var(--dark);font-weight:850}.warn{background:#fff7e5;border-color:#f6c86b;color:#9a5500}.nav{position:fixed;left:0;right:0;bottom:0;z-index:30;padding:8px 10px calc(8px + env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(4,1fr);gap:4px;background:#fff;border-top:1px solid var(--line)}.nav button{border:0;border-radius:12px;background:transparent;display:grid;place-items:center;min-height:54px;font-size:20px;font-weight:850}.nav span{font-size:12px}.nav button.active{background:var(--soft);color:var(--teal)}dialog{width:min(400px,calc(100vw - 24px));max-height:calc(100dvh - 24px);border:0;border-radius:18px;padding:0}.modal{padding:16px;display:grid;gap:12px}.toast{position:fixed;left:50%;bottom:84px;transform:translate(-50%,14px);z-index:80;width:min(370px,calc(100vw - 28px));padding:12px 14px;border-radius:12px;color:#fff;background:#0e2b31;opacity:0}.toast.show{opacity:1;transform:translate(-50%,0)}
  </style>
  <link rel="stylesheet" href="src/polish.css?v=order-phase-1">
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand"><div class="logo">B</div><div><b>Bếp Sỉ Báo Cáo</b><small id="subtitle">Tạo dữ liệu</small></div></div>
    <button class="sync-state" id="syncState" type="button"><span></span><b>Local</b></button>
  </header>
  <main>
    <section class="page active" data-page="create">
      <div class="grid-actions">
        <button class="card home-card card-mcp" data-home-card="mcp" data-page="mcp"><i>🧭</i><b>MCP tuyến</b><small>Tuyến hôm nay và trạng thái ghé.</small><em>Xem UI</em></button>
        <button class="card home-card card-order" data-page="order-shell"><i>🛒</i><b>Đơn hàng</b><small>Khung UI tạo đơn nhanh.</small><em>Xem UI</em></button>
        <button class="card home-card card-test" data-open-test><i>🧪</i><b>Test sản phẩm</b><small>Tạo file test và thêm khách.</small><em>Mở</em></button>
        <button class="card home-card card-report" data-page="report-shell"><i>📊</i><b>Báo cáo</b><small>Khung UI thị trường.</small><em>Xem UI</em></button>
      </div>
      <section class="panel"><div class="head"><h2>Gần đây</h2><button data-page="data">Xem tất cả ›</button></div><div id="recent"></div></section>
    </section>
    <section class="page" data-page="data">
      <h1>Dữ liệu</h1>
      <div id="dataHub" class="data-hub"><div class="data-hub-tabs"><button type="button" class="data-hub-tab" data-data-view="mcp"><i>🧭</i><span>MCP</span></button><button type="button" class="data-hub-tab" data-data-view="order"><i>🛒</i><span>Đơn</span></button><button type="button" class="data-hub-tab active" data-data-view="test"><i>🧪</i><span>Test</span></button><button type="button" class="data-hub-tab" data-data-view="report"><i>📊</i><span>Báo cáo</span></button></div><div id="dataShell" class="data-shell"></div></div>
      <div class="data-list-wrap"><div id="dataList"></div></div>
    </section>
    <section class="page" data-page="ai"><h1>AI tổng hợp</h1><section class="panel"><h2>Dữ liệu sẽ phân tích</h2><div class="metrics" id="aiMetrics"></div><button class="primary wide" id="aiBtn">Tạo báo cáo AI thật</button></section><section class="panel" id="aiResult"><p class="empty">AI chỉ chạy khi backend agent đã cấu hình.</p></section></section>
    <section class="page" data-page="admin"><h1>Admin</h1><article class="admin"><div><b>Supabase</b><br><small id="dbInfo">Đang kiểm tra...</small></div><button class="secondary" id="syncBtn">Đồng bộ</button></article><article class="admin"><div><b>Dữ liệu máy</b><br><small id="adminStats">-</small></div></article><article class="warn">Supabase lấy từ Vercel env. Local DB chỉ là cache và hàng đợi offline.</article></section>
  </main>
  <nav class="nav"><button class="active" data-page="create">⌂<span>Home</span></button><button data-page="data">▤<span>Dữ liệu</span></button><button data-page="ai">✺<span>AI</span></button><button data-page="admin">⚙<span>Admin</span></button></nav>
  <dialog id="modal"></dialog><div class="toast" id="toast"></div>
</div>
<script type="module" src="src/ui-polish.js?v=mcp-order-modal-1"></script>
<script type="module" src="test-first-app.js"></script>
</body>
</html>
